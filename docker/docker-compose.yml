name: ai_employee

services:
  postgres:
    image: postgres:17
    container_name: ai-employee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-ai_employee}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-ai_employee}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: ai-employee-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CORE_STORE_BACKEND: ${CORE_STORE_BACKEND:-postgres}
      USAGE_STORE_BACKEND: ${USAGE_STORE_BACKEND:-postgres}
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-ai_employee}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_RELOAD: "false"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: ai-employee-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  pgdata:
    name: ai_employee_pgdata
