name: ai_employee_test

services:
  postgres:
    image: postgres:17
    container_name: ai-employee-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-test_changeme}
      POSTGRES_DB: ${DB_NAME:-ai_employee_test}
    ports:
      - "${DB_PORT:-55432}:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-ai_employee_test}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-employee-test-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: ai-employee-test-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CORE_STORE_BACKEND: ${CORE_STORE_BACKEND:-postgres}
      USAGE_STORE_BACKEND: ${USAGE_STORE_BACKEND:-postgres}
      AUTO_RUN_DB_MIGRATIONS: ${AUTO_RUN_DB_MIGRATIONS:-true}
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-test_changeme}@postgres:5432/${DB_NAME:-ai_employee_test}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_RELOAD: "false"
    volumes:
      - api_data_test:/root/.ai-native/web-admin-api
    ports:
      - "${HOST_API_PORT:-8100}:8000"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: ai-employee-test-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${HOST_FRONTEND_PORT:-3100}:80"

volumes:
  pgdata_test:
    name: ai_employee_test_pgdata
  api_data_test:
    name: ai_employee_test_api_data
